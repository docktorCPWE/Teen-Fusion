<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Week 12: Keyboard Warriors</title>
  <desc id="desc">A standard computer keyboard where the keys slowly morph from cold metal plastic into glowing green leaves and growing seedlings</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060c"/>
      <stop offset="48%" stop-color="#090d1b"/>
      <stop offset="100%" stop-color="#030510"/>
    </linearGradient>
    <radialGradient id="warm" cx="18%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#00FF85" stop-opacity=".52"/>
      <stop offset="62%" stop-color="#00FF85" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#00FF85" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="82%" cy="62%" r="68%">
      <stop offset="0%" stop-color="#00E0FF" stop-opacity=".5"/>
      <stop offset="58%" stop-color="#00E0FF" stop-opacity=".09"/>
      <stop offset="100%" stop-color="#00E0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity=".55"/>
    </filter>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#ffffff" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <style>
      .line{fill:none;stroke:#f7f4ed;stroke-width:18;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#f7f4ed;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
      .gold{stroke:#00FF85;fill:none}
      .blue{stroke:#00E0FF;fill:none}
      .fillGold{fill:#00FF85}
      .fillBlue{fill:#00E0FF}
      .soft{opacity:.24}
      .label{font:800 24px Inter,system-ui,sans-serif;letter-spacing:8px;fill:#61a0ff}
      .title{font:900 42px Inter,system-ui,sans-serif;letter-spacing:0;fill:#fff7e7}
      .micro{font:800 18px Inter,system-ui,sans-serif;letter-spacing:5px;fill:#aeb6c9}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#warm)"/>
  <rect width="1280" height="720" fill="url(#cool)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <path d="M-80 622C210 548 370 664 642 584c245-72 406-264 718-196" fill="none" stroke="#00FF85" stroke-opacity=".16" stroke-width="72"/>
  <path d="M-88 650C245 590 428 676 690 608c230-60 380-224 666-170" fill="none" stroke="#00E0FF" stroke-opacity=".13" stroke-width="44"/>
  <g filter="url(#softShadow)"><g transform="translate(608 220)"><rect width="480" height="238" rx="18" fill="#f7f4ed" opacity=".12" stroke="#f7f4ed" stroke-opacity=".3" stroke-width="8"/><g fill="#111827" opacity=".8"><rect x="26" y="28" width="38" height="34" rx="6"/><rect x="80" y="28" width="38" height="34" rx="6"/><rect x="134" y="28" width="38" height="34" rx="6"/><rect x="188" y="28" width="38" height="34" rx="6"/><rect x="242" y="28" width="38" height="34" rx="6"/><rect x="296" y="28" width="38" height="34" rx="6"/><rect x="350" y="28" width="38" height="34" rx="6"/><rect x="404" y="28" width="38" height="34" rx="6"/><rect x="26" y="82" width="38" height="34" rx="6"/><rect x="80" y="82" width="38" height="34" rx="6"/><rect x="134" y="82" width="38" height="34" rx="6"/><rect x="188" y="82" width="38" height="34" rx="6"/><rect x="242" y="82" width="38" height="34" rx="6"/><rect x="296" y="82" width="38" height="34" rx="6"/><rect x="350" y="82" width="38" height="34" rx="6"/><rect x="404" y="82" width="38" height="34" rx="6"/><rect x="26" y="136" width="38" height="34" rx="6"/><rect x="80" y="136" width="38" height="34" rx="6"/><rect x="134" y="136" width="38" height="34" rx="6"/><rect x="188" y="136" width="38" height="34" rx="6"/><rect x="242" y="136" width="38" height="34" rx="6"/><rect x="296" y="136" width="38" height="34" rx="6"/><rect x="350" y="136" width="38" height="34" rx="6"/><rect x="404" y="136" width="38" height="34" rx="6"/></g><path d="M170 132c54-74 104-84 152-28-70 4-114 22-152 28ZM248 176c58-56 110-54 154 6-66-14-112-10-154-6Z" fill="#50d17d" opacity=".82"/></g></g>
</svg>