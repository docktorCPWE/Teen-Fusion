<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Week 47: The Global Church</title>
  <desc id="desc">Mosaic pattern composed of varying earthy clay tones forming the clean silhouette shape of a large global sphere map layout</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060c"/>
      <stop offset="48%" stop-color="#090d1b"/>
      <stop offset="100%" stop-color="#030510"/>
    </linearGradient>
    <radialGradient id="warm" cx="18%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#4E3629" stop-opacity=".52"/>
      <stop offset="62%" stop-color="#4E3629" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#4E3629" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="82%" cy="62%" r="68%">
      <stop offset="0%" stop-color="#76A035" stop-opacity=".5"/>
      <stop offset="58%" stop-color="#76A035" stop-opacity=".09"/>
      <stop offset="100%" stop-color="#76A035" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity=".55"/>
    </filter>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" fill="none" stroke="#ffffff" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <style>
      .line{fill:none;stroke:#f7f4ed;stroke-width:18;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#f7f4ed;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
      .gold{stroke:#4E3629;fill:none}
      .blue{stroke:#76A035;fill:none}
      .fillGold{fill:#4E3629}
      .fillBlue{fill:#76A035}
      .soft{opacity:.24}
      .label{font:800 24px Inter,system-ui,sans-serif;letter-spacing:8px;fill:#61a0ff}
      .title{font:900 42px Inter,system-ui,sans-serif;letter-spacing:0;fill:#fff7e7}
      .micro{font:800 18px Inter,system-ui,sans-serif;letter-spacing:5px;fill:#aeb6c9}
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#warm)"/>
  <rect width="1280" height="720" fill="url(#cool)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>
  <path d="M-80 622C210 548 370 664 642 584c245-72 406-264 718-196" fill="none" stroke="#4E3629" stroke-opacity=".16" stroke-width="72"/>
  <path d="M-88 650C245 590 428 676 690 608c230-60 380-224 666-170" fill="none" stroke="#76A035" stroke-opacity=".13" stroke-width="44"/>
  <g filter="url(#softShadow)"><circle cx="884" cy="350" r="208" fill="#8b5a2b" opacity=".44" stroke="#ffd36a" stroke-width="10"/><path d="M676 350h416M884 142c-72 70-108 140-108 208s36 138 108 208M884 142c72 70 108 140 108 208s-36 138-108 208" class="thin" opacity=".5"/><path d="M780 260l72-28 80 54 96-18 48 86-94 64 28 82-124 20-62-64-96 34-62-86 54-72Z" fill="#50d17d" opacity=".34"/></g>
</svg>